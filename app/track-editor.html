<!doctype html>
<html class="dark" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <!-- Use centralized CSP via server headers in server/app.js -->
        <title>Academy Editor - Track Curriculum</title>
        <!-- Tailwind CSS (Compiled) -->
        <link href="dist/output.css" rel="stylesheet" />
        <script src="video-utils.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
        <script src="components.js"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Michroma&amp;family=Noto+Sans:wght@300;400;500;600;700&amp;display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />

        <!-- Quill Rich Text Editor -->
        <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />

        <style>
            body {
                font-family: 'Noto Sans', sans-serif;
            }

            h1,
            h2,
            .branding-font {
                font-family: 'Michroma', sans-serif;
            }

            .drag-handle {
                cursor: grab;
            }

            .drag-handle:active {
                cursor: grabbing;
            }

            .module-content {
                max-height: 2500px;
                transition:
                    max-height 0.3s ease-out,
                    padding 0.3s ease;
            }

            .module-collapsed .module-content {
                max-height: 0;
                padding-top: 0;
                padding-bottom: 0;
                overflow: hidden;
            }

            .chevron-icon {
                transition: transform 0.3s ease;
            }

            .module-collapsed .chevron-icon {
                transform: rotate(-90deg);
            }

            @keyframes bounce-in {
                0% {
                    transform: scale(0.9) translateY(10px);
                    opacity: 0;
                }

                50% {
                    transform: scale(1.05) translateY(-2px);
                    opacity: 1;
                }

                100% {
                    transform: scale(1) translateY(0);
                    opacity: 1;
                }
            }

            .animate-bounce-in {
                animation: bounce-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            }

            .action-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                padding: 0.625rem 1.25rem;
                border-radius: 0.5rem;
                font-weight: 700;
                font-size: 0.875rem;
                transition: all 0.2s;
                min-width: 140px;
                white-space: nowrap;
            }

            @media (max-width: 640px) {
                .action-btn {
                    width: 100%;
                    min-width: 0;
                }
            }
        </style>
    </head>

                    <ai-page-editor-modal></ai-page-editor-modal>
                    <script>
                        function updateDescCounter(textareaId, counterId) {
                            const textarea = document.getElementById(textareaId);
                            const counter = document.getElementById(counterId);
                            if (!textarea || !counter) return;
                            const remaining = 150 - textarea.value.length;
                            counter.textContent = `${remaining} remaining`;
                            counter.className = `text-[10px] ${remaining <= 20 ? 'text-amber-400' : 'text-slate-500'}`;
                        }

                        document.addEventListener('DOMContentLoaded', () => {
                            const urlParams = new URLSearchParams(window.location.search);
                            const trackId = urlParams.get('id');

                            // If no ID is provided, we should probably redirect back to management or show an error
                            if (!trackId) {
                                console.error('No track ID provided');
                                // For backward compatibility or if they just click the sidebar, we might want a default or redirect
                                // window.location.href = 'admin-tracks.html';
                                // return;
                            }

                            const modulesContainer = document.getElementById('modules-container');
                            if (!modulesContainer) return;

                            let autoSaveTimeout;
                            let isSaving = false;

                            const performSave = (window.performSave = async (manual = false) => {
                                if (!trackId) return;

                                const indicator = document.getElementById('save-indicator');
                                const dot = document.getElementById('save-status-dot');

                                if (!window.currentTrack) {
                                    console.warn('Cannot save: Track data not loaded yet');
                                    if (indicator) indicator.textContent = 'Data not loaded yet';
                                    if (manual) showToast('Cannot save: track data not loaded', 'error');
                                    return;
                                }

                                if (isSaving && !manual) return;

                                // If manual save is requested but already saving, we should wait or queue?
                                // For simplicity, let's just abort if already saving BUT update UI if manual.
                                if (isSaving && manual) {
                                    console.log('[performSave] Manual save requested while already saving. Waiting...');
                                    // We'll just let the current save finish, or try again in a bit.
                                    setTimeout(() => performSave(true), 500);
                                    return;
                                }

                                isSaving = true;

                                const saveBtn = document.querySelector('button[onclick="saveCurriculum(true)"]');
                                const originalBtnContent = saveBtn ? saveBtn.innerHTML : '';
                                if (saveBtn && manual) {
                                    saveBtn.disabled = true;
                                    saveBtn.innerHTML =
                                        '<span class="material-symbols-outlined animate-spin text-[18px]">sync</span> Saving...';
                                }

                                if (indicator) indicator.textContent = manual ? 'Saving draft...' : 'Auto-saving...';

                                const modules = Array.from(modulesContainer.querySelectorAll('ai-module'));
                                console.log(`[performSave] Found ${modules.length} modules to save.`);

                                const data = modules.map((mod, idx) => {
                                    const items = Array.from(mod.querySelectorAll('ai-content-item'));
                                    console.log(
                                        `[performSave] Module ${idx + 1} ("${mod.getAttribute('title')}") has ${items.length} items.`
                                    );
                                    return {
                                        step: mod.getAttribute('step'),
                                        title: mod.getAttribute('title'),
                                        items: items.map(item => {
                                            const attrs = {};
                                            Array.from(item.attributes).forEach(attr => {
                                                attrs[attr.name] = attr.value;
                                            });
                                            return attrs;
                                        })
                                    };
                                });

                                // 1. Local Storage fallback/cache
                                localStorage.setItem(`ai-curriculum-${trackId || 'default'}`, JSON.stringify(data));

                                console.log('[performSave] Sending PUT request to /api/tracks/' + trackId);

                                try {
                                    if (!window.currentTrack) {
                                        console.warn(
                                            '[performSave] window.currentTrack missing. Attempting to save without metadata.'
                                        );
                                    }
                                    const response = await fetch(`/api/tracks/${trackId}`, {
                                        method: 'PUT',
                                        headers: { 'Content-Type': 'application/json' },
                                        credentials: 'include',
                                        body: JSON.stringify({
                                            ...window.currentTrack,
                                            curriculumDraft: JSON.stringify(data)
                                        })
                                    });

                                    console.log(
                                        `[performSave] Response status: ${response.status} ${response.statusText}`
                                    );

                                    if (saveBtn && manual) {
                                        saveBtn.disabled = false;
                                        saveBtn.innerHTML = originalBtnContent;
                                    }

                                    if (response.ok) {
                                        const result = await response.json();
                                        console.log(
                                            '[performSave] Save successful. Updated track status:',
                                            result.status
                                        );

                                        if (indicator) {
                                            indicator.textContent = 'All changes saved';
                                            dot.className = 'size-2 rounded-full bg-emerald-500';
                                        }
                                        if (window.showToast && manual) window.showToast('Draft saved successfully');

                                        // Update lessons count
                                        updateLessonsCount(data);
                                        // Update status badge (since we just saved a draft)
                                        updateStatusBadge(result.status, true);
                                    } else {
                                        const errBody = await response.json().catch(() => ({}));
                                        console.error('[performSave] Server error detail:', errBody);
                                        throw new Error(errBody.detail || errBody.error || 'Save failed');
                                    }
                                } catch (error) {
                                    console.error('Save failed:', error);
                                    if (saveBtn && manual) {
                                        saveBtn.disabled = false;
                                        saveBtn.innerHTML = originalBtnContent;
                                    }
                                    if (indicator) {
                                        indicator.textContent = 'Save failed';
                                        dot.className = 'size-2 rounded-full bg-red-500';
                                    }
                                    if (window.showToast) window.showToast('Failed to save draft', 'error');
                                } finally {
                                    isSaving = false;
                                }
                            });

                            const previewTrack = (window.previewTrack = () => {
                                console.log('[Preview] Preview button clicked.');
                                if (!window.currentTrack) {
                                    console.error('[Preview] Track data not loaded yet.');
                                    alert('Track data not loaded yet.');
                                    return;
                                }
                                const id = window.currentTrack.id;
                                const name = window.currentTrack.name || '';
                                const targetPage = name.toUpperCase().includes('TECHNICAL')
                                    ? 'learning-track-technical.html'
                                    : 'learning-track-business.html';
                                const url = `${targetPage}?preview=true&id=${id}`;
                                console.log('[Preview] Redirecting to:', url);
                                window.location.href = url;
                            });

                            const saveCurriculum = (window.saveCurriculum = (manual = false) => {
                                const indicator = document.getElementById('save-indicator');
                                const dot = document.getElementById('save-status-dot');

                                if (!manual) {
                                    if (indicator && !indicator.textContent.includes('Unsaved')) {
                                        indicator.textContent = 'Unsaved changes...';
                                        if (dot) {
                                            dot.classList.remove('bg-emerald-500');
                                            dot.classList.add('bg-amber-500');
                                        }
                                    }
                                    clearTimeout(autoSaveTimeout);
                                    autoSaveTimeout = setTimeout(() => performSave(), 2000);
                                    return;
                                }

                                performSave(true);
                            });

                            const loadCurriculum = async () => {
                                if (!trackId) {
                                    return;
                                }

                                try {
                                    const response = await fetch(`/api/tracks/${trackId}/modules`, {
                                        credentials: 'include'
                                    });
                                    if (!response.ok) throw new Error('Failed to load track data');

                                    const data = await response.json();

                                    // Update Page Header
                                    if (data.track) {
                                        const titleEl = document.querySelector('h1.font-display');
                                        if (titleEl) titleEl.textContent = data.track.name;

                                        const descEl = document.querySelector('p.text-slate-400.max-w-2xl');
                                        if (descEl) descEl.textContent = data.track.description || '';

                                        const badge = document.getElementById('track-status-badge');
                                        if (badge) {
                                            updateStatusBadge(data.track.status, !!data.track.curriculumDraft);
                                        }

                                        const iconEl = document.getElementById('track-icon-header');
                                        if (iconEl)
                                            iconEl.textContent =
                                                data.track.icon ||
                                                (data.track.name.toUpperCase().includes('TECH')
                                                    ? 'terminal'
                                                    : 'trending_up');

                                        // Store current track data for settings modal
                                        window.currentTrack = data.track;
                                    }

                                    // Priority 1: Server-side Draft
                                    if (data.track && data.track.curriculumDraft) {
                                        try {
                                            const draft = JSON.parse(data.track.curriculumDraft);
                                            if (Array.isArray(draft) && draft.length > 0) {
                                                renderCurriculum(draft);
                                                updateLessonsCount(draft);
                                                return;
                                            }
                                        } catch (e) {
                                            console.error('Failed to parse server draft:', e);
                                        }
                                    }

                                    // Priority 2: Published Modules (Transition/Fallback)
                                    const groupedModules = [];
                                    data.modules.forEach(m => {
                                        const modTitle = m.description || 'Module';
                                        const modStep = m.order ? m.order.toString().padStart(2, '0') : '01';

                                        let group = groupedModules.find(g => g.title === modTitle);
                                        if (!group) {
                                            group = { title: modTitle, step: modStep, items: [] };
                                            groupedModules.push(group);
                                        }

                                        group.items.push({
                                            title: m.title,
                                            type: m.type,
                                            'file-id': m.fileId || '',
                                            'video-id': m.mediaUrl && m.mediaUrl.length < 50 ? m.mediaUrl : '',
                                            'blob-url': m.mediaUrl || ''
                                        });
                                    });

                                    if (groupedModules.length > 0) {
                                        renderCurriculum(groupedModules);
                                        updateLessonsCount(groupedModules);
                                    } else {
                                        // Priority 3: Local Storage fallback
                                        const saved = localStorage.getItem(`ai-curriculum-${trackId}`);
                                        if (saved) {
                                            const parsed = JSON.parse(saved);
                                            renderCurriculum(parsed);
                                            updateLessonsCount(parsed);
                                        }
                                    }
                                } catch (err) {
                                    console.error('Error loading curriculum:', err);
                                }
                            };

                            const renderCurriculum = data => {
                                const addModuleBtnArea = document.getElementById('add-module-btn').parentElement;
                                modulesContainer.querySelectorAll('ai-module').forEach(m => m.remove());

                                data.forEach(modData => {
                                    const mod = document.createElement('ai-module');
                                    mod.setAttribute('step', modData.step);
                                    mod.setAttribute('title', modData.title);

                                    modData.items.forEach(itemAttrs => {
                                        const item = document.createElement('ai-content-item');
                                        Object.entries(itemAttrs).forEach(([name, value]) => {
                                            item.setAttribute(name, value);
                                        });
                                        mod.appendChild(item);
                                    });

                                    modulesContainer.insertBefore(mod, addModuleBtnArea);
                                });
                            };

                            const updateLessonsCount = curriculumData => {
                                let count = 0;
                                curriculumData.forEach(mod => {
                                    count += (mod.items || []).length;
                                });
                                const el = document.getElementById('total-lessons-count');
                                if (el) el.textContent = count;
                            };

                            const updateStatusBadge = (status, hasDraft) => {
                                const badge = document.getElementById('track-status-badge');
                                if (!badge) return;

                                if (status === 'PUBLISHED') {
                                    if (hasDraft) {
                                        badge.textContent = 'Unpublished Changes';
                                        badge.className =
                                            'status-badge bg-amber-500/10 text-amber-500 border border-amber-500/20';
                                    } else {
                                        badge.textContent = 'Published';
                                        badge.className =
                                            'status-badge bg-emerald-500/10 text-emerald-500 border border-emerald-500/20';
                                    }
                                } else {
                                    badge.textContent = 'Draft';
                                    badge.className =
                                        'status-badge bg-amber-500/10 text-amber-500 border border-amber-500/20';
                                }
                            };

                            // Initial Load
                            loadCurriculum();

                            const fetchTrackStatus = async () => {
                                if (!trackId) return;
                                try {
                                    const response = await fetch(`/api/tracks/${trackId}`, { credentials: 'include' });
                                    const track = await response.json();
                                    if (track) {
                                        const badge = document.getElementById('track-status-badge');
                                        if (badge) {
                                            updateStatusBadge(track.status, !!track.curriculumDraft);
                                        }
                                        const iconEl = document.getElementById('track-icon-header');
                                        if (iconEl && track.icon) iconEl.textContent = track.icon;

                                        // Update store
                                        window.currentTrack = track;
                                    }
                                } catch (err) {
                                    console.error('Error fetching track status:', err);
                                }
                            };

                            fetchTrackStatus();

                            // Main Sortable (Modules)
                            new Sortable(modulesContainer, {
                                animation: 150,
                                handle: '.drag-handle',
                                ghostClass: 'bg-slate-800/50',
                                chosenClass: 'border-[var(--ai-primary)]/50',
                                dragClass: 'opacity-50',
                                onEnd: () => saveCurriculum()
                            });

                            const addModuleBtn = document.getElementById('add-module-btn');
                            if (addModuleBtn) {
                                addModuleBtn.addEventListener('click', async () => {
                                    const renameModal = document.querySelector('ai-rename-modal');
                                    if (renameModal) {
                                        const title = await renameModal.show('', 'Create New Module');
                                        if (title) {
                                            const modules = modulesContainer.querySelectorAll('ai-module');
                                            const nextStepNum = modules.length + 1;
                                            const nextStep = nextStepNum.toString().padStart(2, '0');

                                            const newModule = document.createElement('ai-module');
                                            newModule.setAttribute('step', nextStep);
                                            newModule.setAttribute('title', title);

                                            modulesContainer.insertBefore(newModule, addModuleBtn.parentElement);
                                            saveCurriculum();
                                        }
                                    }
                                });
                            }

                            // Mutation Observer for internal changes
                            const observer = new MutationObserver(mutations => {
                                let shouldSave = false;
                                mutations.forEach(m => {
                                    if (m.type === 'childList') shouldSave = true;
                                    if (m.type === 'attributes' && m.attributeName !== 'locked') shouldSave = true;
                                });
                                if (shouldSave) saveCurriculum();
                            });

                            observer.observe(modulesContainer, {
                                childList: true,
                                subtree: true,
                                attributes: true,
                                attributeFilter: [
                                    'title',
                                    'type',
                                    'icon',
                                    'color',
                                    'blob-url',
                                    'success-threshold',
                                    'subtype',
                                    'video-id',
                                    'step',
                                    'file-id'
                                ]
                            });

                            // Toast system
                            window.showToast = (message, type = 'success') => {
                                const toast = document.createElement('div');
                                toast.className = `fixed bottom-8 right-8 z-[2000] px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3 animate-bounce-in ${type === 'success' ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-white border border-slate-700'}`;
                                toast.innerHTML = `
                                <span class="material-symbols-outlined">${type === 'success' ? 'check_circle' : 'info'}</span>
                                <span class="text-sm font-bold">${message}</span>
                            `;
                                document.body.appendChild(toast);
                                setTimeout(() => {
                                    toast.classList.add('opacity-0', 'translate-y-2');
                                    toast.style.transition = 'all 0.3s ease';
                                    setTimeout(() => toast.remove(), 300);
                                }, 3000);
                            };

                            window.publishTrack = async () => {
                                const modal = document.getElementById('publish-modal');
                                const modulesContainer = document.getElementById('modules-container');

                                // 0. Collect current state from DOM
                                const modules = Array.from(modulesContainer.querySelectorAll('ai-module'));
                                const curriculum = modules.map(mod => {
                                    const items = Array.from(mod.querySelectorAll('ai-content-item'));
                                    return {
                                        step: mod.getAttribute('step'),
                                        title: mod.getAttribute('title'),
                                        items: items.map(item => {
                                            const attrs = {};
                                            Array.from(item.attributes).forEach(attr => {
                                                attrs[attr.name] = attr.value;
                                            });
                                            return attrs;
                                        })
                                    };
                                });

                                if (!curriculum.length) {
                                    showToast('No curriculum data found to publish.', 'error');
                                    return;
                                }

                                try {
                                    if (!trackId) {
                                        showToast('Track ID missing. Cannot publish.', 'error');
                                        return;
                                    }

                                    // 1. Check for local files (only flag truly temporary content)
                                    const hasLocalFiles = curriculum.some(mod =>
                                        (mod.items || []).some(item => {
                                            const blobUrl = item['blob-url'] || '';
                                            const hasFileId = !!(item.fileId || item['file-id']);
                                            // A blob: URL is always temporary
                                            if (blobUrl.startsWith('blob:')) return true;
                                            // A file-id without a permanent server URL means local-only
                                            if (
                                                hasFileId &&
                                                (!blobUrl || blobUrl === '#' || blobUrl.startsWith('local:'))
                                            )
                                                return true;
                                            return false;
                                        })
                                    );

                                    if (hasLocalFiles) {
                                        const confirmed = await window.confirm(
                                            '🛑 ATTENTION: Some content items are using LOCAL files (marked with a blob: URL or file-id). \n\n' +
                                                'These files ARE NOT yet uploaded to the server and will be INACCESSIBLE to your learners. \n\n' +
                                                "To fix this, please use 'Replace File' on each problematic item before publishing. \n\n" +
                                                'Do you want to proceed with publishing anyway? (Learners will see an error for these items)'
                                        );
                                        if (!confirmed) return;
                                    }

                                    // 2. Publish
                                    const publishRes = await fetch(`/api/tracks/${trackId}/publish`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        credentials: 'include',
                                        body: JSON.stringify({ modules: curriculum })
                                    });

                                    if (!publishRes.ok) {
                                        const err = await publishRes.json();
                                        throw new Error(err.error || 'Failed to publish');
                                    }

                                    modal.classList.add('hidden');
                                    showToast('Curriculum published successfully!');
                                    fetchTrackStatus();
                                } catch (err) {
                                    console.error('Publish error:', err);
                                    showToast(err.message || 'Error publishing track.', 'error');
                                }
                            };

                            // Track Settings Logic
                            window.openTrackSettings = () => {
                                if (!window.currentTrack) return;
                                const t = window.currentTrack;
                                document.getElementById('setting-name').value = t.name;
                                document.getElementById('setting-description').value = t.description || '';
                                updateDescCounter('setting-description', 'setting-desc-counter');
                                document.getElementById('setting-icon').value = t.icon || 'terminal';
                                document.getElementById('setting-icon-preview').textContent = t.icon || 'terminal';
                                document.getElementById('setting-status').value = t.status;

                                // Populate Departments
                                const depts = t.targetDepartments
                                    ? t.targetDepartments.split(',').map(d => d.trim())
                                    : [];
                                document.querySelectorAll('.dept-checkbox').forEach(cb => {
                                    cb.checked = depts.includes(cb.value);
                                });

                                document.getElementById('settings-modal').classList.remove('hidden');
                            };

                            window.toggleAllDepartments = checked => {
                                document.querySelectorAll('.dept-checkbox').forEach(cb => (cb.checked = checked));
                            };

                            window.closeTrackSettings = () => {
                                document.getElementById('settings-modal').classList.add('hidden');
                            };

                            const settingIconInput = document.getElementById('setting-icon');
                            if (settingIconInput) {
                                settingIconInput.addEventListener('input', e => {
                                    document.getElementById('setting-icon-preview').textContent =
                                        e.target.value.trim() || 'question_mark';
                                });
                            }

                            window.saveTrackMetadata = async e => {
                                e.preventDefault();
                                const saveBtn = document.getElementById('save-settings-btn');
                                saveBtn.disabled = true;
                                saveBtn.textContent = 'Saving...';

                                const selectedDepts = Array.from(document.querySelectorAll('.dept-checkbox:checked'))
                                    .map(cb => cb.value)
                                    .join(',');

                                const payload = {
                                    name: document.getElementById('setting-name').value,
                                    description: document.getElementById('setting-description').value,
                                    icon: document.getElementById('setting-icon').value,
                                    status: document.getElementById('setting-status').value,
                                    targetDepartments: selectedDepts
                                };

                                try {
                                    const response = await fetch(`/api/tracks/${trackId}`, {
                                        method: 'PUT',
                                        headers: { 'Content-Type': 'application/json' },
                                        credentials: 'include',
                                        body: JSON.stringify(payload)
                                    });

                                    if (!response.ok) throw new Error('Failed to update settings');

                                    showToast('Track settings updated successfully!');
                                    closeTrackSettings();
                                    fetchTrackStatus(); // Refresh UI header
                                } catch (err) {
                                    console.error('Save settings error:', err);
                                    showToast(err.message || 'Error updating settings', 'error');
                                } finally {
                                    saveBtn.disabled = false;
                                    saveBtn.textContent = 'Save Settings';
                                }
                            };
                        });
                    </script>
                </div>
            </main>
        </div>
        <!-- Modals -->
        <ai-confirm-modal></ai-confirm-modal>
        <ai-quiz-upload-modal></ai-quiz-upload-modal>
        <ai-quiz-modal></ai-quiz-modal>
        <ai-rename-modal></ai-rename-modal>
        <ai-media-upload-modal></ai-media-upload-modal>
        <ai-media-viewer-modal></ai-media-viewer-modal>
        <ai-video-insert-modal></ai-video-insert-modal>
        <ai-link-insert-modal></ai-link-insert-modal>
        <ai-content-picker-modal></ai-content-picker-modal>

        <script src="video-utils.js"></script>
        <ai-profile-modal></ai-profile-modal>
    </body>
</html>
