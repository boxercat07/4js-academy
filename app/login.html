<!doctype html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome - Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="shared.css" />
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="page-transition flex flex-col items-center justify-center min-h-screen relative">
    <!-- Back Button -->
    <a href="index.html"
        class="absolute top-6 left-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors bg-slate-800/50 hover:bg-slate-700 px-4 py-2 rounded-lg font-semibold text-sm border border-slate-700">
        ← Back to Home
    </a>

    <div class="w-full max-w-md mx-auto px-6 py-12 text-center">
        <div class="mb-8 flex items-center justify-center gap-2">
            <img alt="Four Js Logo" class="h-10 w-auto object-contain" src="logo.png" />
        </div>
        <h1 class="text-4xl font-extrabold text-white mb-2 font-display leading-tight">
            Welcome to the
            <br />
            Academy
        </h1>
        <p class="text-slate-400 mb-8">Let's get started with your profile.</p>

        <!-- Tabs -->
        <div class="flex rounded-lg overflow-hidden border border-slate-700 mb-8" id="auth-tabs">
            <button onclick="switchTab('signin')" id="tab-signin"
                class="flex-1 py-3 text-sm font-semibold transition-all bg-primary text-white">
                Sign In
            </button>
            <button onclick="switchTab('register')" id="tab-register"
                class="flex-1 py-3 text-sm font-semibold transition-all bg-transparent text-slate-400 hover:text-white">
                Register
            </button>
        </div>

        <!-- Form Container to prevent height jumping -->
        <div class="h-[432px] relative w-full">
            <!-- Register Form (hidden by default) -->
            <form id="form-register"
                class="text-left space-y-5 absolute top-0 left-0 w-full hidden opacity-0 transition-opacity duration-300"
                onsubmit="handleAuth(event, 'register')">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">First Name</label>
                    <input type="text" id="reg-firstname" placeholder="Enter your first name"
                        class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-primary transition-colors"
                        value="Alex" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Last Name</label>
                    <input type="text" id="reg-lastname" placeholder="Enter your last name"
                        class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-primary transition-colors" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Department</label>
                    <select id="reg-department" required
                        class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-700 text-white focus:outline-none focus:border-primary transition-colors appearance-none">
                        <option value="" disabled selected>Select your department</option>
                        <option value="Sales">Sales</option>
                        <option value="PS">PS</option>
                        <option value="Marketing">Marketing</option>
                        <option value="R&D">R&D</option>
                        <option value="Finance">Finance</option>
                        <option value="Customer Care">Customer Care</option>
                        <option value="IT & Security">IT & Security</option>
                        <option value="HR">HR</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Work Email</label>
                    <input type="email" id="reg-email" placeholder="email@4js.com" oninput="validateRegistrationForm()"
                        class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-primary transition-colors" />
                    <div id="email-validation-hint" class="mt-2 flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-wider text-slate-500">
                        <span class="material-symbols-outlined text-[14px]">info</span>
                        Only @4js.com domain is allowed
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
                    <div class="relative">
                        <input type="password" id="reg-password" oninput="validateRegistrationForm()"
                            class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-primary transition-colors pr-12" />
                        <button type="button" onclick="togglePasswordVisibility('reg-password', this)" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors flex items-center justify-center w-8 h-8">
                            <span class="material-symbols-outlined text-xl">visibility</span>
                        </button>
                    </div>
                    
                    <div class="mt-4 p-4 bg-slate-900/50 border border-slate-800 rounded-lg space-y-2">
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Security Requirements:</p>
                        <div id="req-length" class="flex items-center gap-2 text-xs text-slate-500 transition-colors">
                            <span class="material-symbols-outlined text-sm">circle</span> At least 12 characters
                        </div>
                        <div id="req-case" class="flex items-center gap-2 text-xs text-slate-500 transition-colors">
                            <span class="material-symbols-outlined text-sm">circle</span> Uppercase & lowercase letters
                        </div>
                        <div id="req-number" class="flex items-center gap-2 text-xs text-slate-500 transition-colors">
                            <span class="material-symbols-outlined text-sm">circle</span> At least one number
                        </div>
                        <div id="req-special" class="flex items-center gap-2 text-xs text-slate-500 transition-colors">
                            <span class="material-symbols-outlined text-sm">circle</span> At least one special character
                        </div>
                    </div>
                </div>
                <button type="submit" id="btn-register-submit" disabled 
                    class="btn-primary w-full py-4 text-lg mt-4 disabled:opacity-50 disabled:cursor-not-allowed disabled:grayscale">
                    Create Account →
                </button>
            </form>

            <!-- Sign In Form -->
            <form id="form-signin"
                class="text-left space-y-5 absolute top-0 left-0 w-full block opacity-100 transition-opacity duration-300"
                onsubmit="handleAuth(event, 'signin')">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Work Email</label>
                    <input type="email" id="signin-email" placeholder="email@4js.com"
                        class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-primary transition-colors" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
                    <div class="relative">
                        <input type="password" id="signin-password" placeholder="••••••••"
                            class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-primary transition-colors pr-12" />
                        <button type="button" onclick="togglePasswordVisibility('signin-password', this)" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors flex items-center justify-center w-8 h-8">
                            <span class="material-symbols-outlined text-xl">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Spacer to push button down -->
                <div class="h-[104px]"></div>
                <button type="submit" class="btn-primary w-full py-4 text-lg mt-4">Sign In →</button>
            </form>
        </div>

        <p class="text-slate-600 text-xs mt-8 uppercase tracking-wider font-semibold">Powered by Four Js</p>
    </div>
    <script>
        async function handleAuth(event, type) {
            event.preventDefault();

            try {
                let response;
                if (type === 'register') {
                    const firstName = document.getElementById('reg-firstname').value;
                    const lastName = document.getElementById('reg-lastname').value;
                    const email = document.getElementById('reg-email').value;
                    const password = document.getElementById('reg-password').value;
                    const department = document.getElementById('reg-department').value;

                    response = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ firstName, lastName, email, password, department })
                    });
                } else {
                    const email = document.getElementById('signin-email').value;
                    const password = document.getElementById('signin-password').value;

                    response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                }

                const data = await response.json();

                if (!response.ok) {
                    alert('Error: ' + (data.error || 'Authentication failed'));
                    return;
                }

                // Setup local session info and redirect
                const fullName = `${data.user.firstName || ''} ${data.user.lastName || ''}`.trim() || 'User';
                sessionStorage.setItem('userName', fullName);
                sessionStorage.setItem('userRole', data.user.role);
                sessionStorage.setItem('userId', data.user.id);
                sessionStorage.setItem('userDepartment', data.user.department || '');

                if (data.user.role === 'ADMIN') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // Update session storage if track exists
                    if (data.user.trackId) {
                        sessionStorage.setItem('userTrackId', data.user.trackId);
                        sessionStorage.setItem('userTrackName', data.user.trackName || '');
                    }
                    window.location.href = type === 'register' ? 'success.html' : 'tracks.html';
                }
            } catch (error) {
                console.error('Authentication Error:', error);
                alert('A network error occurred.');
            }
        }

        function switchTab(tab) {
            const registerForm = document.getElementById('form-register');
            const signinForm = document.getElementById('form-signin');

            if (tab === 'signin') {
                registerForm.classList.add('opacity-0');
                setTimeout(() => {
                    registerForm.classList.add('hidden');
                    signinForm.classList.remove('hidden');
                    // Slight delay to allow display block to apply before animating opacity
                    setTimeout(() => signinForm.classList.remove('opacity-0'), 10);
                }, 300);
            } else {
                signinForm.classList.add('opacity-0');
                setTimeout(() => {
                    signinForm.classList.add('hidden');
                    registerForm.classList.remove('hidden');
                    setTimeout(() => registerForm.classList.remove('opacity-0'), 10);
                }, 300);
            }

            document.getElementById('tab-register').classList.toggle('bg-primary', tab === 'register');
            document.getElementById('tab-register').classList.toggle('text-white', tab === 'register');
            document.getElementById('tab-register').classList.toggle('text-slate-400', tab === 'signin');
            document.getElementById('tab-signin').classList.toggle('bg-primary', tab === 'signin');
            document.getElementById('tab-signin').classList.toggle('text-white', tab === 'signin');
            document.getElementById('tab-signin').classList.toggle('text-slate-400', tab === 'register');
        }

        function togglePasswordVisibility(inputId, buttonEl) {
            const input = document.getElementById(inputId);
            const icon = buttonEl.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Handle initial tab selection via URL parameter
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const tab = params.get('tab');
            if (tab === 'signin' || tab === 'register') {
                // Use a non-animated version of switchTab logic for immediate load
                const registerForm = document.getElementById('form-register');
                const signinForm = document.getElementById('form-signin');
                const tabSignin = document.getElementById('tab-signin');
                const tabRegister = document.getElementById('tab-register');

                if (tab === 'register') {
                    signinForm.classList.add('hidden', 'opacity-0');
                    signinForm.classList.remove('block', 'opacity-100');
                    registerForm.classList.remove('hidden', 'opacity-0');
                    registerForm.classList.add('block', 'opacity-100');
                    
                    tabSignin.classList.remove('bg-primary', 'text-white');
                    tabSignin.classList.add('bg-transparent', 'text-slate-400');
                    tabRegister.classList.add('bg-primary', 'text-white');
                    tabRegister.classList.remove('bg-transparent', 'text-slate-400');
                } else if (tab === 'signin') {
                    registerForm.classList.add('hidden', 'opacity-0');
                    registerForm.classList.remove('block', 'opacity-100');
                    signinForm.classList.remove('hidden', 'opacity-0');
                    signinForm.classList.add('block', 'opacity-100');
                    
                    tabRegister.classList.remove('bg-primary', 'text-white');
                    tabRegister.classList.add('bg-transparent', 'text-slate-400');
                    tabSignin.classList.add('bg-primary', 'text-white');
                    tabSignin.classList.remove('bg-transparent', 'text-slate-400');
                }
            }
        });

        function validateRegistrationForm() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const submitBtn = document.getElementById('btn-register-submit');
            
            // Email validation
            const isEmailValid = email.toLowerCase().endsWith('@4js.com');
            const emailHint = document.getElementById('email-validation-hint');
            if (isEmailValid) {
                emailHint.classList.replace('text-slate-500', 'text-teal-500');
                emailHint.querySelector('span').textContent = 'check_circle';
            } else {
                emailHint.classList.replace('text-teal-500', 'text-slate-500');
                emailHint.querySelector('span').textContent = 'info';
            }

            // Password requirements validation
            const checks = {
                length: password.length >= 12,
                case: /[A-Z]/.test(password) && /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[^A-Za-z0-9]/.test(password)
            };

            const updateReq = (id, isValid) => {
                const el = document.getElementById(`req-${id}`);
                const icon = el.querySelector('span');
                if (isValid) {
                    el.classList.replace('text-slate-500', 'text-teal-500');
                    icon.textContent = 'check_circle';
                } else {
                    el.classList.replace('text-teal-500', 'text-slate-500');
                    icon.textContent = 'circle';
                }
            };

            Object.keys(checks).forEach(key => updateReq(key, checks[key]));

            const isPasswordValid = Object.values(checks).every(v => v === true);
            submitBtn.disabled = !(isEmailValid && isPasswordValid);
        }
    </script>
</body>

</html>
