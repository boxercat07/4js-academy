<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registration Successful - Academy</title>
        <!-- Tailwind CSS (Compiled) -->
        <link href="dist/output.css" rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
        <script src="components.js"></script>
    </head>

    <body class="page-transition">
        <!-- Nav -->
        <!-- Factored out Header Component -->
        <learner-header></learner-header>

        <main class="flex items-center justify-center" style="min-height: calc(100vh - 130px)">
            <div class="text-center px-6 page-transition">
                <!-- Animated Checkmark -->
                <div
                    class="mx-auto w-28 h-28 rounded-full bg-primary flex items-center justify-center mb-8 shadow-2xl shadow-primary/30"
                    style="animation: scaleIn 0.5s ease-out"
                >
                    <span class="material-symbols-outlined text-white text-6xl">check</span>
                </div>
                <h1 class="text-5xl font-extrabold text-white mb-4 font-display leading-tight">
                    Registration
                    <br />
                    Successful!
                </h1>
                <p class="text-xl text-slate-300 mb-2">
                    Welcome to the Academy,
                    <span class="text-primary font-bold" id="user-name-display">Alex</span>
                    . Your profile is ready.
                </p>
                <p class="text-slate-400 mb-10">
                    You can now select your specialized training path
                    <br />
                    and start your journey.
                </p>
                <a href="tracks.html" class="btn-primary px-10 py-4 text-lg inline-block">Choose Your Track</a>
            </div>
        </main>

        <footer class="border-t border-slate-800 py-6 text-center text-slate-500 text-sm">
            © 2026 Four Js Academy. All rights reserved.
        </footer>
        <style>
            @keyframes scaleIn {
                from {
                    transform: scale(0);
                    opacity: 0;
                }

                to {
                    transform: scale(1);
                    opacity: 1;
                }
            }
        </style>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const userName = sessionStorage.getItem('userName');
                if (userName && userName.trim() !== '') {
                    document.getElementById('user-name-display').textContent = userName;
                }
            });
        </script>
    </body>
</html>
